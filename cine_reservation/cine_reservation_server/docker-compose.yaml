services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: cine_reservation
      POSTGRES_PASSWORD: "tEFeNOj8XNnoP7Ov1BK3U0Lr8Pbbc-Tr"
    volumes:
      - cine_reservation_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "-RK8WW3yKDz9xALueiNLWGC_kAGEykd0"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: cine_reservation_test
      POSTGRES_PASSWORD: "AiPsHqb6vg3HCyEkRFQRIxbnp2OkPHb9"
    volumes:
      - cine_reservation_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "oXmM3_L-8rissGRBUurT9jkB-6kuFQeK"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  cine_reservation_data:
  cine_reservation_test_data:
