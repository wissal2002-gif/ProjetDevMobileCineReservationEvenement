class: Utilisateur
table: utilisateurs
fields:
  authUserId: String?
  nom: String
  email: String
  telephone: String?
  dateNaissance: DateTime?
  preferences: List<String>?
  statut: String?, default='actif'
  role: String?, default='client'
indexes:
  utilisateur_email_idx:
    fields: email
    unique: true
  utilisateur_auth_idx:
    fields: authUserId
    unique: true