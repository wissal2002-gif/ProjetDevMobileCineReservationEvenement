class: Utilisateur
table: utilisateurs
managedMigration: true

fields:
  authUserId: String?
  nom: String
  email: String
  telephone: String?
  dateNaissance: DateTime?
  preferences: List<String>?
  statut: String?, default='actif'
  role: String?, default='client' # client, super_admin, admin_local, staff
  cinemaId: int?
  nomCinema: String? # Ajoutez ceci pour corriger l'erreur de la sidebar
  pointsFidelite: int?, default=0
  photoProfil: String?

indexes:
  utilisateur_email_idx:
    fields: email
    unique: true
  utilisateur_auth_idx:
    fields: authUserId
    unique: true
  utilisateur_cinema_idx:
    fields: cinemaId